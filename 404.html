<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>redirect...</title>
		<script>
			var l = window.location;
			if (!l.search.startsWith('?')) {
				// 현재 경로를 올바르게 변환하고 리디렉션
				l.replace(
					l.protocol +
						'//' +
						l.hostname +
						(l.port ? ':' + l.port : '') +
						l.pathname.split('/').slice(0, 2).join('/') +
						'/' +
						l.pathname.split('/')[1] + // 첫 번째 언어 경로로 리디렉션
						(l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
						l.hash
				);
			}
		</script>
	</head>
	<body></body>
</html>
